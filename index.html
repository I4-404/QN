<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استوديو الاقتباسات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Aref+Ruqaa:wght@400;700&family=Amiri&family=Reem+Kufi&family=Lalezar&family=Markazi+Text:wght@500;700&family=Jomhuria&family=Tajawal:wght@400;500;700;900&family=Almarai:wght@400;700;800&family=Changa:wght@400;600;700&family=El+Messiri:wght@400;600;700&family=Rakkas&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#100e17; --panel:#1a1724; --panel2:#211d2f; --panel3:#282237;
    --border:#332c47; --text:#f3f0fa; --muted:#978fb3; --muted2:#6d6489;
    --violet:#8b5cf6; --pink:#ec4899; --amber:#f0b429; --teal:#38bdf8;
    --grad: linear-gradient(135deg,var(--violet),var(--pink));
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Cairo',sans-serif;
    overflow:hidden; height:100vh;
  }
  #app{display:flex; flex-direction:column; height:100vh;}

  /* ---------- Topbar ---------- */
  #topbar{
    display:flex; align-items:center; gap:14px; padding:10px 18px;
    background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .logo{
    font-family:'Aref Ruqaa',serif; font-weight:700; font-size:22px;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
    white-space:nowrap;
  }
  #topbar select, #topbar button, #topbar input[type=number]{
    font-family:'Cairo',sans-serif; background:var(--panel2); color:var(--text);
    border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px;
    cursor:pointer; transition:.15s;
  }
  #topbar button:hover{border-color:var(--violet); color:#fff;}
  #topbar .spacer{flex:1;}
  .btn-primary{
    background:var(--grad) !important; border:none !important; color:#fff !important;
    font-weight:700 !important; box-shadow:0 4px 14px rgba(139,92,246,.35);
  }
  .btn-primary:hover{filter:brightness(1.08);}
  #linkFolderBtn{border-color:var(--teal) !important; color:var(--teal) !important;}

  /* ---------- Main layout ---------- */
  main{display:flex; flex:1; min-height:0;}

  /* ---------- Asset drawers (right) ---------- */
  #assetPanel{
    width:270px; flex-shrink:0; background:var(--panel); border-left:1px solid var(--border);
    display:flex; flex-direction:column;
  }
  .drawer-tabs{display:flex; padding:10px 10px 0 10px; gap:4px;}
  .drawer-tab{
    flex:1; text-align:center; padding:10px 4px 8px; font-size:12px; font-weight:600;
    background:var(--panel2); color:var(--muted); border:1px solid var(--border); border-bottom:none;
    border-radius:8px 8px 0 0; cursor:pointer; transform:translateY(4px); transition:.15s;
  }
  .drawer-tab.active{
    background:var(--panel3); color:#fff; transform:translateY(0); box-shadow:0 -2px 0 var(--tab-color,var(--violet)) inset;
  }
  .drawer-tab[data-tab="fonts"]{--tab-color:var(--violet);}
  .drawer-tab[data-tab="backgrounds"]{--tab-color:var(--teal);}
  .drawer-tab[data-tab="elements"]{--tab-color:var(--amber);}
  .drawer-tab[data-tab="templates"]{--tab-color:var(--pink);}
  .drawer-body{
    flex:1; overflow-y:auto; padding:14px; background:var(--panel3); border-top:1px solid var(--border);
  }
  .drawer-hint{font-size:11px; color:var(--muted2); line-height:1.7; margin-bottom:12px;}
  .quick-import{
    width:100%; padding:9px; margin-bottom:12px; border:1.5px dashed var(--border); border-radius:8px;
    background:transparent; color:var(--muted); font-size:12px; cursor:pointer; font-family:Cairo;
  }
  .quick-import:hover{border-color:var(--violet); color:#fff;}
  .asset-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .asset-item{
    border:1px solid var(--border); border-radius:8px; background:var(--panel2); cursor:pointer;
    overflow:hidden; text-align:center; transition:.15s; position:relative;
  }
  .asset-item:hover{border-color:var(--violet); transform:translateY(-2px);}
  .asset-item img{width:100%; height:60px; object-fit:cover; display:block;}
  .asset-item .lbl{font-size:11px; padding:5px 3px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .font-item{padding:14px 6px; font-size:16px;}
  .swatch{height:60px; width:100%;}
  .empty-note{font-size:12px; color:var(--muted2); text-align:center; padding:20px 8px; line-height:1.8;}
  .asset-del{
    position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%;
    background:rgba(0,0,0,.6); color:#fff; font-size:11px; line-height:18px; text-align:center;
    cursor:pointer; z-index:2;
  }
  .asset-del:hover{background:#b5384a;}
  .upload-btn{
    width:100%; padding:10px; margin-bottom:12px; border:none; border-radius:8px;
    background:var(--grad); color:#fff; font-weight:700; font-size:12.5px; cursor:pointer; font-family:Cairo;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .upload-btn:hover{filter:brightness(1.08);}
  .section-label{font-size:11.5px; color:var(--muted); font-weight:700; margin:4px 0 8px;}
  .emoji-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:16px;}
  .emoji-item{
    background:var(--panel2); border:1px solid var(--border); border-radius:8px; font-size:20px;
    padding:8px 0; text-align:center; cursor:pointer;
  }
  .emoji-item:hover{border-color:var(--violet); transform:translateY(-2px);}
  .grad-swatch{height:38px; border-radius:6px; cursor:pointer; border:1px solid var(--border);}
  .grad-swatches{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:12px;}
  #customW, #customH{width:64px !important;}

  /* ---------- Stage ---------- */
  #stageWrap{flex:1; display:flex; flex-direction:column; min-width:0; background:radial-gradient(circle at 50% 0%, #1c1730, var(--bg));}
  .mini-toolbar{
    display:flex; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .mini-toolbar button{
    background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:7px;
    padding:7px 12px; font-size:12px; cursor:pointer; font-family:Cairo;
  }
  .mini-toolbar button:hover{border-color:var(--violet);}
  .mini-toolbar button.active{background:var(--grad); border:none; color:#fff;}
  .zoom-controls button:hover{color:var(--violet) !important;}
  #stageOuter{
    flex:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:auto; padding:20px;
  }
  #stage{background:#fff; box-shadow:0 20px 60px rgba(0,0,0,.5); cursor:default; touch-action:none; display:block;}
  #textEditor{
    position:absolute; resize:none; border:2px solid var(--violet); background:rgba(255,255,255,.95);
    color:#111; font-family:Cairo; padding:4px; outline:none; border-radius:4px;
  }

  /* ---------- Properties (left) ---------- */
  #propPanel{
    width:250px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border);
    padding:16px; overflow-y:auto;
  }
  #propPanel h3{font-size:13px; color:var(--muted); margin:0 0 10px; font-weight:700;}
  .prop-group{margin-bottom:18px;}
  .prop-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px;}
  .prop-row label{font-size:12px; color:var(--muted); white-space:nowrap;}
  .prop-row select, .prop-row input[type=color]{
    background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:6px;
    padding:5px; font-family:Cairo; font-size:12px; flex:1; min-width:0;
  }
  .prop-row input[type=range]{flex:1;}
  .align-btns, .style-btns{display:flex; gap:6px;}
  .align-btns button, .style-btns button, .layer-btns button{
    flex:1; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    border-radius:6px; padding:6px; cursor:pointer; font-size:13px;
  }
  .align-btns button.active, .style-btns button.active{background:var(--grad); border:none; color:#fff;}
  .layer-btns{display:flex; gap:6px; margin-bottom:8px;}
  .danger-btn{
    width:100%; background:transparent; border:1px solid #b5384a; color:#f18ba0; border-radius:7px;
    padding:8px; cursor:pointer; font-family:Cairo; font-size:12px; margin-top:6px;
  }
  .danger-btn:hover{background:#b5384a; color:#fff;}
  .layers-list{list-style:none; margin:0; padding:0;}
  .layers-list li{
    display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:6px; font-size:12px;
    cursor:pointer; color:var(--muted); border:1px solid transparent;
  }
  .layers-list li.selected{background:var(--panel3); color:#fff; border-color:var(--violet);}
  .no-selection{color:var(--muted2); font-size:12px; text-align:center; padding:30px 0; line-height:1.8;}

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

  /* ---------- New: zoom controls / autosave indicator ---------- */
  .zoom-controls{display:flex; align-items:center; gap:4px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:2px 4px;}
  .zoom-controls button{background:transparent !important; border:none !important; padding:6px 9px !important; font-size:14px !important;}
  #zoomLabel{font-size:11.5px; color:var(--muted); min-width:42px; text-align:center; white-space:nowrap;}
  #autosaveIndicator{font-size:11px; color:var(--muted2); white-space:nowrap;}

  /* ---------- New: grid overlay canvas ---------- */
  #gridOverlay{position:absolute; pointer-events:none; top:0; left:0;}

  /* ---------- New: drawer tabs wrap (more tabs now) ---------- */
  .drawer-tabs{flex-wrap:wrap; row-gap:4px;}
  .drawer-tab{flex:1 1 30%; padding:8px 4px 7px; font-size:11px;}
  .drawer-tab[data-tab="quotes"]{--tab-color:#38bdf8;}
  .drawer-tab[data-tab="styles"]{--tab-color:#f0b429;}
  .drawer-tab[data-tab="colors"]{--tab-color:#8b5cf6;}
  .drawer-tab[data-tab="effects"]{--tab-color:#38bdf8;}
  .search-box{
    width:100%; box-sizing:border-box; background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:9px 12px; font-family:Cairo; font-size:13px; margin-bottom:12px;
  }
  .fav-star{position:absolute; top:6px; left:6px; font-size:14px; cursor:pointer; z-index:2;}
  .surprise-btn{
    width:100%; padding:12px; border:none; border-radius:9px; margin-bottom:10px;
    background:linear-gradient(135deg,#f0b429,#ec4899); color:#fff; font-weight:700; cursor:pointer; font-family:Cairo;
  }

  /* ---------- New: quotes library ---------- */
  .quote-cat{font-size:11.5px; color:var(--muted); font-weight:700; margin:14px 0 8px;}
  .quote-cat:first-child{margin-top:0;}
  .quote-card{
    background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px 12px;
    margin-bottom:8px; cursor:pointer; transition:.15s;
  }
  .quote-card:hover{border-color:var(--teal); transform:translateY(-1px);}
  .quote-card .qtext{font-size:13px; line-height:1.7; color:var(--text); margin-bottom:4px;}
  .quote-card .qauthor{font-size:11px; color:var(--muted2);}

  /* ---------- New: text style presets ---------- */
  .style-preset-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .style-preset{
    border:1px solid var(--border); border-radius:10px; padding:14px 6px; text-align:center;
    cursor:pointer; background:var(--panel2); font-size:14px; transition:.15s;
  }
  .style-preset:hover{border-color:var(--amber); transform:translateY(-2px);}

  /* ---------- New: color palette ---------- */
  .palette-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px;}
  .palette-swatch{
    height:44px; border-radius:8px; border:1px solid var(--border); cursor:pointer; position:relative;
  }
  .palette-swatch .pal-del{
    position:absolute; top:-5px; left:-5px; width:16px; height:16px; border-radius:50%; background:#b5384a;
    color:#fff; font-size:10px; line-height:16px; text-align:center; cursor:pointer;
  }
  .palette-add{display:flex; gap:8px; margin-bottom:10px; align-items:center;}
  .palette-add input[type=color]{flex:1; height:38px; border-radius:8px; border:1px solid var(--border); background:var(--panel2);}
  .pattern-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;}
  .pattern-swatch{height:50px; border-radius:8px; border:1px solid var(--border); cursor:pointer;}
  .pattern-swatch:hover{border-color:var(--violet);}

  /* ---------- New: layer row lock/hide icons ---------- */
  .layers-list li{justify-content:space-between;}
  .layer-icons{display:flex; gap:6px;}
  .layer-icons span{cursor:pointer; opacity:.7;}
  .layer-icons span:hover{opacity:1;}
  .layers-list li.locked-el{opacity:.55;}

  /* ---------- New: modal (shortcuts / help) ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center;
    z-index:100;
  }
  .modal-box{
    background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:24px 26px;
    max-width:420px; width:90%; max-height:80vh; overflow-y:auto;
  }
  .modal-box h2{margin:0 0 14px; font-size:17px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .modal-box table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .modal-box td{padding:7px 4px; border-bottom:1px solid var(--border); color:var(--muted);}
  .modal-box td:first-child{color:var(--text); font-weight:700; width:40%;}
  .modal-close{
    margin-top:16px; width:100%; padding:10px; border:none; border-radius:8px; background:var(--grad);
    color:#fff; font-weight:700; cursor:pointer; font-family:Cairo;
  }
  .lock-hide-row{display:flex; gap:6px; margin-bottom:8px;}
  .lock-hide-row button{flex:1;}
  .align-edge-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px;}
  .align-edge-grid button{background:var(--panel2); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:7px; cursor:pointer; font-size:12px;}
  .align-edge-grid button:hover{border-color:var(--violet);}

  /* ---------- New: tools sidebar drawer (moved from crowded topbar) ---------- */
  #topbar{flex-wrap:nowrap;}
  #sidebarToggleBtn{font-weight:700;}
  #sidebarBackdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:199;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  #sidebarBackdrop.open{opacity:1; pointer-events:auto;}
  #toolsSidebar{
    position:fixed; top:0; right:0; height:100vh; width:320px; max-width:88vw;
    background:var(--panel); border-left:1px solid var(--border); z-index:200;
    transform:translateX(100%); transition:transform .25s ease; overflow-y:auto;
    padding:18px 18px 40px; box-shadow:-10px 0 40px rgba(0,0,0,.4);
  }
  #toolsSidebar.open{transform:translateX(0);}
  .tools-sidebar-head{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
    padding-bottom:14px; border-bottom:1px solid var(--border);
  }
  .tools-sidebar-head button{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; width:32px; height:32px; font-size:14px; cursor:pointer;
  }
  .tools-sidebar-head button:hover{border-color:var(--violet);}
  .tools-section{margin-bottom:22px;}
  .tools-section-title{
    font-size:13px; font-weight:700; color:var(--muted); margin-bottom:10px;
    display:flex; align-items:center; gap:6px;
  }
  .tool-btn-full{
    display:block; width:100%; text-align:right; background:var(--panel2); color:var(--text);
    border:1px solid var(--border); border-radius:9px; padding:12px 14px; font-size:14px;
    font-family:Cairo; cursor:pointer; margin-bottom:8px; transition:.15s;
  }
  .tool-btn-full:hover{border-color:var(--violet); color:#fff;}
  .tool-btn-full:last-child{margin-bottom:0;}
  .tool-select-full{
    width:100%; background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:9px; padding:11px 14px; font-size:14px; font-family:Cairo; cursor:pointer;
  }
  .tool-row-inline{display:flex; gap:8px; margin-top:8px;}
  .tool-row-inline input[type=number]{
    flex:1; background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:9px; padding:10px; font-size:14px; font-family:Cairo; min-width:0;
  }
  .tool-btn-half{
    flex:1; background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:9px; padding:12px; font-size:14px; font-family:Cairo; cursor:pointer;
  }
  .tool-btn-half:hover{border-color:var(--violet); color:#fff;}
  #toolsSidebar .zoom-controls button{padding:9px 12px !important; font-size:16px !important;}
  #toolsSidebar #zoomLabel{font-size:13px;}
</style>
</head>
<body>
<div id="app">

  <header id="topbar">
    <button id="sidebarToggleBtn" title="فتح قائمة الأدوات">☰ الأدوات</button>
    <div class="logo">🖋 استوديو الاقتباسات</div>
    <span class="spacer"></span>
    <span id="autosaveIndicator"></span>
    <button id="exportBtn" class="btn-primary">⬇ تنزيل PNG</button>
  </header>

  <div id="sidebarBackdrop"></div>
  <aside id="toolsSidebar">
    <div class="tools-sidebar-head">
      <div class="logo" style="font-size:19px;">🖋 استوديو الاقتباسات</div>
      <button id="sidebarCloseBtn" title="إغلاق">✕</button>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">📄 الملف والمشروع</div>
      <button id="newBtn" class="tool-btn-full">🗎 تصميم جديد</button>
      <button id="saveProjectBtn" class="tool-btn-full">💾 حفظ المشروع</button>
      <button id="loadProjectBtn" class="tool-btn-full">📁 فتح مشروع محفوظ</button>
      <button id="saveDraftBtn" class="tool-btn-full">🗂 حفظ كمسودة باسم</button>
      <button id="myDraftsBtn" class="tool-btn-full">📚 مسوداتي المحفوظة</button>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">📐 مقاس التصميم</div>
      <select id="canvasSizeSelect" class="tool-select-full">
        <option value="1080x1080">منشور مربع 1:1</option>
        <option value="1080x1920">ستوري 9:16</option>
        <option value="1200x630">منشور أفقي</option>
        <option value="1600x400">بانر</option>
        <option value="1080x1350">منشور عمودي 4:5</option>
        <option value="1280x720">ثمبنيل يوتيوب 16:9</option>
        <option value="1500x500">غلاف تويتر/X</option>
        <option value="820x312">غلاف فيسبوك</option>
        <option value="1000x1500">بينتيريست</option>
        <option value="1200x627">منشور لينكدإن</option>
        <option value="800x800">صورة بروفايل مربعة</option>
        <option value="2560x1440">غلاف قناة يوتيوب</option>
        <option value="custom">مقاس مخصص…</option>
      </select>
      <div class="tool-row-inline">
        <input type="number" id="customW" placeholder="عرض" style="display:none;">
        <input type="number" id="customH" placeholder="ارتفاع" style="display:none;">
      </div>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">↩ تراجع وتكبير</div>
      <div class="tool-row-inline">
        <button id="undoBtn" class="tool-btn-half">↩ تراجع</button>
        <button id="redoBtn" class="tool-btn-half">↪ إعادة</button>
      </div>
      <div class="zoom-controls" style="width:100%; justify-content:space-between; margin-top:8px;">
        <button id="zoomOutBtn" title="تصغير">−</button>
        <span id="zoomLabel">100%</span>
        <button id="zoomInBtn" title="تكبير">+</button>
        <button id="zoomFitBtn" title="ملائمة الشاشة">⛶</button>
      </div>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">🗂 مجلد الأصول</div>
      <button id="linkFolderBtn" class="tool-btn-full">📂 ربط مجلد الأصول تلقائيًا</button>
      <button id="rescanBtn" class="tool-btn-full">🔄 تحديث المجلد المرتبط</button>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">🎲 إلهام سريع</div>
      <button id="surpriseMeBtn" class="tool-btn-full">🎲 تصميم عشوائي (فاجئني)</button>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">🏷 العلامة المائية</div>
      <button id="insertWatermarkBtn" class="tool-btn-full">➕ إضافة توقيعك/علامتك المائية</button>
      <button id="setWatermarkBtn" class="tool-btn-full">⚙ ضبط نص العلامة المائية الافتراضي</button>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">⬇ التصدير</div>
      <button id="exportJpgBtn" class="tool-btn-full">⬇ تنزيل JPG</button>

/* ============================================================
   INDEXEDDB (persist linked folder handle)
   ============================================================ */
function idbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open('quote-studio-db', 2);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
      if(!db.objectStoreNames.contains('uploads')) db.createObjectStore('uploads', {keyPath:'id', autoIncrement:true});
      if(!db.objectStoreNames.contains('templates')) db.createObjectStore('templates', {keyPath:'id', autoIncrement:true});
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, val){
  try{
    const db = await idbOpen();
    return new Promise((res,rej)=>{
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').put(val, key);
      tx.oncomplete = ()=>res(true);
      tx.onerror = ()=>rej(tx.error);
    });
  }catch(e){ return false; }
}
async function idbGet(key){
  try{
    const db = await idbOpen();
    return new Promise((res)=>{
      const tx = db.transaction('handles','readonly');
      const r = tx.objectStore('handles').get(key);
      r.onsuccess = ()=>res(r.result || null);
      r.onerror = ()=>res(null);
    });
  }catch(e){ return null; }
}
async function idbAdd(storeName, record){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const tx = db.transaction(storeName,'readwrite');
    const r = tx.objectStore(storeName).add(record);
    r.onsuccess = ()=>res(r.result);
    tx.onerror = ()=>rej(tx.error);
  });
}
async function idbGetAll(storeName){
  try{
    const db = await idbOpen();
    return new Promise((res)=>{
      const tx = db.transaction(storeName,'readonly');
      const r = tx.objectStore(storeName).getAll();
      r.onsuccess = ()=>res(r.result||[]);
      r.onerror = ()=>res([]);
    });
  }catch(e){ return []; }
}
async function idbDelete(storeName, id){
  try{
    const db = await idbOpen();
    return new Promise((res)=>{
      const tx = db.transaction(storeName,'readwrite');
      tx.objectStore(storeName).delete(id);
      tx.oncomplete = ()=>res(true);
      tx.onerror = ()=>res(false);
    });
  }catch(e){ return false; }
}

/* ============================================================
   DIRECT UPLOAD LIBRARY (persists in IndexedDB, works instantly
   in ANY browser — no folder linking, no editing list.js)
   ============================================================ */
function openUploader(type){
  const input = document.getElementById('hiddenFileInput');
  input.accept = type==='font' ? '.ttf,.otf,.woff,.woff2' : 'image/*';
  input.multiple = true;
  input.onchange = async ()=>{
    const files = Array.from(input.files||[]);
    for(const file of files){
      try{
        const id = await idbAdd('uploads', {type, name:file.name, blob:file, addedAt:Date.now()});
        await registerUploadedAsset(type, id, file);
      }catch(e){ alert('تعذر إضافة: '+file.name); }
    }
    input.value=''; input.multiple=false;
    renderDrawer();
  };
  input.click();
}
async function registerUploadedAsset(type, id, file){
  const url = URL.createObjectURL(file);
  if(type==='font'){
    const buf = await file.arrayBuffer();
    const family = 'uploaded_'+id;
    const face = new FontFace(family, buf);
    await face.load();
    document.fonts.add(face);
    assetLibrary.fonts.push({family, label:file.name.replace(/\.[^.]+$/,''), source:'uploaded', id});
  } else if(type==='background'){
    assetLibrary.backgrounds.push({name:file.name.replace(/\.[^.]+$/,''), src:url, source:'uploaded', id});
  } else if(type==='element'){
    assetLibrary.elements.push({name:file.name.replace(/\.[^.]+$/,''), src:url, source:'uploaded', id});
  }
}
async function loadUploadedAssets(){
  const uploads = await idbGetAll('uploads');
  for(const rec of uploads){
    try{ await registerUploadedAsset(rec.type, rec.id, rec.blob); }catch(e){}
  }
  const tpls = await idbGetAll('templates');
  tpls.forEach(t=> assetLibrary.templates.push({name:t.name, data:t.data, source:'uploaded', id:t.id}));
}
async function deleteUploadedAsset(type, id){
  await idbDelete('uploads', id);
  if(type==='font') assetLibrary.fonts = assetLibrary.fonts.filter(f=>f.id!==id);
  if(type==='background') assetLibrary.backgrounds = assetLibrary.backgrounds.filter(f=>f.id!==id);
  if(type==='element') assetLibrary.elements = assetLibrary.elements.filter(f=>f.id!==id);
  renderDrawer();
}
async function saveCurrentAsTemplate(){
  const name = prompt('اسم القالب الجديد:', 'قالبي');
  if(!name) return;
  const data = { background:{...state.background, img:undefined}, elements: state.elements.map(e=>({...e, img:undefined, id:undefined})) };
  const id = await idbAdd('templates', {name, data, addedAt:Date.now()});
  assetLibrary.templates.push({name, data, source:'uploaded', id});
  renderDrawer();
  alert('تم حفظ القالب! هتلاقيه دايمًا في تبويب القوالب.');
}
async function deleteTemplateAsset(id){
  await idbDelete('templates', id);
  assetLibrary.templates = assetLibrary.templates.filter(t=>t.id!==id);
  renderDrawer();
}

let linkedDirHandle = null;

async function linkFolder(){
  if(!window.showDirectoryPicker){
    alert('المتصفح ده مش بيدعم الربط التلقائي (استخدم Chrome أو Edge)، استخدم الطريقة اليدوية بدل كده.');
    return;
  }
  try{
    const handle = await window.showDirectoryPicker();
    linkedDirHandle = handle;
    await idbSet('assetsDir', handle);
    await rescanFolder();
  }catch(e){ /* user cancelled */ }
}

async function rescanFolder(){
  if(!linkedDirHandle){
    const stored = await idbGet('assetsDir');
    if(stored) linkedDirHandle = stored;
  }
  if(!linkedDirHandle){ alert('مفيش مجلد مرتبط لسه. دوس "ربط مجلد الأصول" الأول.'); return; }
  try{
    const perm = await linkedDirHandle.requestPermission({mode:'read'});
    if(perm !== 'granted'){ alert('محتاجين إذن الوصول للمجلد.'); return; }
  }catch(e){ alert('حصلت مشكلة في إذن الوصول، جرب تربط المجلد تاني.'); return; }

  // clear previous 'auto' entries
  assetLibrary.fonts = assetLibrary.fonts.filter(f=>f.source!=='auto');
  assetLibrary.backgrounds = assetLibrary.backgrounds.filter(f=>f.source!=='auto');
  assetLibrary.elements = assetLibrary.elements.filter(f=>f.source!=='auto');
  assetLibrary.templates = assetLibrary.templates.filter(f=>f.source!=='auto');

  for await (const [name, subHandle] of linkedDirHandle.entries()){
    if(subHandle.kind !== 'directory') continue;
    const key = name.toLowerCase();
    if(!['fonts','backgrounds','elements','templates'].includes(key)) continue;
    for await (const [fname, fileHandle] of subHandle.entries()){
      if(fileHandle.kind !== 'file') continue;
      if(fname.toLowerCase() === 'list.js') continue;
      try{
        const file = await fileHandle.getFile();
        if(key === 'fonts'){
          const buf = await file.arrayBuffer();
          const family = 'auto_' + sanitizeName(fname);
          const face = new FontFace(family, buf);
          await face.load();
          document.fonts.add(face);
          assetLibrary.fonts.push({family, label:fname, source:'auto'});
        } else if(key === 'backgrounds'){
          const url = URL.createObjectURL(file);
          assetLibrary.backgrounds.push({name:fname, src:url, source:'auto'});
        } else if(key === 'elements'){
          const url = URL.createObjectURL(file);
          assetLibrary.elements.push({name:fname, src:url, source:'auto'});
        } else if(key === 'templates' && fname.toLowerCase().endsWith('.json')){
          const txt = await file.text();
          try{
            const parsed = JSON.parse(txt);
            assetLibrary.templates.push({name:parsed.name || fname, data:parsed.data || parsed, source:'auto'});
          }catch(e){}
        }
      }catch(e){}
    }
  }
  renderDrawer();
}

function sanitizeName(fname){
  return fname.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_\u0600-\u06FF]/g,'_');
}

/* ============================================================
   BUILD ASSET LIBRARY FROM MANIFESTS
   ============================================================ */
function buildLibraryFromManifests(){
  BUILTIN_FONTS.forEach(f=> assetLibrary.fonts.push({family:f, label:f, source:'builtin'}));

  const styleTag = document.createElement('style');
  let cssText = '';
  (window.FONTS_MANIFEST || []).forEach(entry=>{
    const family = 'manifest_' + sanitizeName(entry.file);
    cssText += `@font-face{ font-family:'${family}'; src:url('assets/fonts/${entry.file}'); }\n`;
    assetLibrary.fonts.push({family, label:entry.name || entry.file, source:'manifest'});
  });
  styleTag.textContent = cssText;
  document.head.appendChild(styleTag);

  (window.BACKGROUNDS_MANIFEST || []).forEach(entry=>{
    assetLibrary.backgrounds.push({name:entry.name || entry.file, src:'assets/backgrounds/'+entry.file, source:'manifest'});
  });
  (window.ELEMENTS_MANIFEST || []).forEach(entry=>{
    assetLibrary.elements.push({name:entry.name || entry.file, src:'assets/elements/'+entry.file, source:'manifest'});
  });

  BUILTIN_TEMPLATES.forEach(t=> assetLibrary.templates.push({name:t.name, data:t.data, source:'builtin'}));
  (window.TEMPLATES_MANIFEST || []).forEach(entry=>{
    assetLibrary.templates.push({name:entry.name, data:entry.data, source:'manifest'});
  });
}

/* ============================================================
   HISTORY (undo/redo)
   ============================================================ */
function snapshot(){
  return JSON.stringify({
    canvasW:state.canvasW, canvasH:state.canvasH,
    background:{...state.background, img:null},
    elements: state.elements.map(e=>({...e, img:null})),
    selectedId: state.selectedId,
    effects: state.effects
  });
}
function pushHistory(){
  const snap = snapshot();
  historyStack.push(snap);
  if(historyStack.length > 50) historyStack.shift();
  redoStack = [];
  try{ localStorage.setItem('qs_autosave', snap); }catch(e){}
  if(typeof updateAutosaveIndicator === 'function') updateAutosaveIndicator();
}
function restoreSnapshot(json){
  const s = JSON.parse(json);
  state.canvasW = s.canvasW; state.canvasH = s.canvasH;
  state.background = s.background; loadBackgroundImage();
  state.elements = s.elements;
  state.elements.forEach(loadElementImage);
  state.selectedId = s.selectedId;
  state.multiSelectIds = [];
  state.effects = s.effects || { vignette:0, grain:0, frameType:'none', frameColor:'#ffffff', frameWidth:24, textureType:'none', textureOpacity:50 };
  syncCanvasSize();
  renderProps();
  draw();
}
function undo(){
  if(historyStack.length < 2) return;
  redoStack.push(historyStack.pop());
  restoreSnapshot(historyStack[historyStack.length-1]);
}
function redo(){
  if(!redoStack.length) return;
  const s = redoStack.pop();
  historyStack.push(s);
  restoreSnapshot(s);
}

const canvas = document.getElementById('stage');

let fitScale = 1;
function syncCanvasSize(){
  canvas.width = state.canvasW;
  canvas.height = state.canvasH;
  const maxW = document.getElementById('stageOuter').clientWidth - 40;
  const maxH = document.getElementById('stageOuter').clientHeight - 40;
  fitScale = Math.min(maxW/state.canvasW, maxH/state.canvasH, 1);
  const scale = fitScale * (state.zoom||1);
  canvas.style.width = (state.canvasW*scale)+'px';
  canvas.style.height = (state.canvasH*scale)+'px';
  const overlay = document.getElementById('gridOverlay');
  if(overlay){
    overlay.width = state.canvasW; overlay.height = state.canvasH;
    overlay.style.width = canvas.style.width; overlay.style.height = canvas.style.height;
  }
  const lbl = document.getElementById('zoomLabel');
  if(lbl) lbl.textContent = Math.round((state.zoom||1)*100)+'%';
  drawGridOverlay();
}
function drawGridOverlay(){
  const overlay = document.getElementById('gridOverlay');
  if(!overlay) return;
  const gctx = overlay.getContext('2d');
  gctx.clearRect(0,0,overlay.width,overlay.height);
  if(!state.showGrid) return;
  gctx.strokeStyle = 'rgba(139,92,246,.35)';
  gctx.lineWidth = 1;
  const g = 20;
  for(let x=0;x<=overlay.width;x+=g){ gctx.beginPath(); gctx.moveTo(x,0); gctx.lineTo(x,overlay.height); gctx.stroke(); }
  for(let y=0;y<=overlay.height;y+=g){ gctx.beginPath(); gctx.moveTo(0,y); gctx.lineTo(overlay.width,y); gctx.stroke(); }
}
function setZoom(z){
  state.zoom = Math.max(0.25, Math.min(3, z));
  syncCanvasSize();
}

function loadBackgroundImage(){
  if(state.background.type==='image' && state.background.src){
    const img = new Image();
    img.onload = draw;
    img.src = state.background.src;
    state.background.img = img;
  }
}
function loadElementImage(el){
  if(el.type==='image' && el.src && !el.img){
    const img = new Image();
    img.onload = draw;
    img.src = el.src;
    el.img = img;
  }
}

/* ============================================================
   AI BACKGROUND REMOVAL
   Uses @imgly/background-removal (runs fully in the browser via
   WASM/ONNX — no server, no API key). Loaded lazily on first use
   so it never slows down normal app startup. Needs an internet
   connection the FIRST time only, to download the small AI model
   (cached by the browser afterwards for instant reuse).
   ============================================================ */
let _bgRemovalLibPromise = null;
function loadBgRemovalLib(){
  if(!_bgRemovalLibPromise){
    _bgRemovalLibPromise = import('https://esm.sh/@imgly/background-removal@1.5.8');
  }
  return _bgRemovalLibPromise;
}
async function removeImageBackground(el){
  const btn = document.getElementById('p_removeBg');
  if(!btn || btn.disabled) return;
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.style.opacity = .6;
  btn.textContent = '⏳ جارِ تحميل نموذج الذكاء الاصطناعي…';
  try{
    const { removeBackground } = await loadBgRemovalLib();
    const resultBlob = await removeBackground(el.src, {
      progress: (key, current, total) => {
        if(total){ btn.textContent = `⏳ جارِ إزالة الخلفية… ${Math.round(current/total*100)}%`; }
      }
    });
    const newUrl = URL.createObjectURL(resultBlob);
    if(!el.srcBeforeBgRemoval){ el.srcBeforeBgRemoval = el.src; }
    el.src = newUrl;
    el.img = null;
    el.bgRemoved = true;
    loadElementImage(el);
    draw(); renderProps(); pushHistory();
  }catch(e){
    console.error(e);
    alert('تعذّرت إزالة الخلفية. تأكد من اتصالك بالإنترنت (تُحمَّل أول مرة فقط) ومن أن الصورة صالحة، ثم حاول مرة أخرى.');
    btn.disabled = false;
    btn.style.opacity = 1;
    btn.textContent = originalLabel;
  }
}

/* ============================================================
   FAST COLOR-BASED BACKGROUND REMOVAL (بدون ذكاء اصطناعي)
   يمسح أي لون خلفية (زي الأبيض أو الأخضر) فورًا بمقارنة كل بكسل
   باللون المحدد؛ لا يحتاج إنترنت ولا نموذج ذكاء اصطناعي — فقط رياضة ألوان بسيطة وسريعة.
   ============================================================ */
function hexToRgb(hex){
  const h = (hex||'#ffffff').replace('#','');
  return { r:parseInt(h.substr(0,2),16)||0, g:parseInt(h.substr(2,2),16)||0, b:parseInt(h.substr(4,2),16)||0 };
}
function removeBackgroundByColor(el, hexColor, tolerance, feather){
  return new Promise((resolve,reject)=>{
    if(!el.img || !el.img.complete){ reject(new Error('no image')); return; }
    try{
      const w = el.img.naturalWidth || el.img.width;
      const h = el.img.naturalHeight || el.img.height;
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const tctx = tmp.getContext('2d', {willReadFrequently:true});
      tctx.drawImage(el.img, 0, 0, w, h);
      const imgData = tctx.getImageData(0,0,w,h);
      const data = imgData.data;
      const target = hexToRgb(hexColor);
      const edge = Math.max(1, tolerance);
      const featherRange = Math.max(0, feather);
      for(let i=0;i<data.length;i+=4){
        const dr = data[i]-target.r, dg = data[i+1]-target.g, db = data[i+2]-target.b;
        const dist = Math.sqrt(dr*dr+dg*dg+db*db);
        if(dist <= edge){ data[i+3] = 0; }
        else if(featherRange>0 && dist <= edge+featherRange){
          const t = (dist-edge)/featherRange;
          data[i+3] = Math.round(data[i+3]*t);
        }
      }
      tctx.putImageData(imgData,0,0);
      tmp.toBlob(blob=>{
        if(!blob){ reject(new Error('toBlob failed')); return; }
        resolve(URL.createObjectURL(blob));
      }, 'image/png');
    }catch(e){ reject(e); }
  });
}
async function applyColorBgRemoval(el, hexColor, tolerance, feather){
  const btn = document.getElementById('p_removeBgColor');
  const originalLabel = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.style.opacity = .6; btn.textContent = '⏳ جارِ الإزالة…'; }
  try{
    const newUrl = await removeBackgroundByColor(el, hexColor, tolerance, feather);
    if(!el.srcBeforeBgRemoval){ el.srcBeforeBgRemoval = el.src; }
    el.src = newUrl;
    el.img = null;
    el.bgRemoved = true;
    el.bgTolerance = tolerance;
    el.bgFeather = feather;
    el.lastPickedBgColor = hexColor;
    loadElementImage(el);
    draw(); renderProps(); pushHistory();
  }catch(e){
    console.error(e);
    alert('تعذّرت إزالة الخلفية بهذه الطريقة، جرّب صورة أخرى أو غيّر اللون المحدد.');
    if(btn){ btn.disabled = false; btn.style.opacity = 1; btn.textContent = originalLabel; }
  }
}
function drawColorPickPreview(el){
  const cnv = document.getElementById('p_colorPickCanvas');
  if(!cnv || !el.img || !el.img.complete) return;
  const ctx2 = cnv.getContext('2d', {willReadFrequently:true});
  const iw = el.img.naturalWidth||el.img.width||1, ih = el.img.naturalHeight||el.img.height||1;
  const scale = Math.min(cnv.width/iw, cnv.height/ih);
  const dw = iw*scale, dh = ih*scale;
  const dx = (cnv.width-dw)/2, dy = (cnv.height-dh)/2;
  ctx2.clearRect(0,0,cnv.width,cnv.height);
  ctx2.fillStyle = '#2a2438'; ctx2.fillRect(0,0,cnv.width,cnv.height);
  ctx2.drawImage(el.img, dx, dy, dw, dh);
}

/* ============================================================
   DUOTONE (تراكب لون ثنائي) — يحوّل الصورة إلى تدرّج بين لونين
   حسب درجة الإضاءة (luminance) لكل بكسل، ويتم عمل cache للنتيجة
   حتى لا يعاد الحساب في كل إعادة رسم.
   ============================================================ */
function getDuotoneCanvas(el){
  if(!el.img || !el.img.complete) return null;
  const shadow = el.duotoneShadow || '#1a1a2e';
  const highlight = el.duotoneHighlight || '#f0b429';
  const amt = (el.duotoneIntensity??100);
  const key = `${el.img.src}|${shadow}|${highlight}|${amt}`;
  if(el._duotoneCache && el._duotoneCache.key===key) return el._duotoneCache.canvas;
  const w = el.img.naturalWidth || el.img.width, h = el.img.naturalHeight || el.img.height;
  if(!w || !h) return null;
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const tctx = tmp.getContext('2d', {willReadFrequently:true});
  tctx.drawImage(el.img, 0, 0, w, h);
  const imgData = tctx.getImageData(0,0,w,h);
  const data = imgData.data;
  const sh = hexToRgb(shadow), hi = hexToRgb(highlight);
  const t = amt/100;
  for(let i=0;i<data.length;i+=4){
    const lum = (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) / 255;
    const r = sh.r + (hi.r-sh.r)*lum;
    const g = sh.g + (hi.g-sh.g)*lum;
    const b = sh.b + (hi.b-sh.b)*lum;
    data[i]   = data[i]   + (r-data[i])*t;
    data[i+1] = data[i+1] + (g-data[i+1])*t;
    data[i+2] = data[i+2] + (b-data[i+2])*t;
  }
  tctx.putImageData(imgData,0,0);
  el._duotoneCache = {key, canvas:tmp};
  return tmp;
}

function drawBackground(){
  const b = state.background;
  if(b.type==='color'){
    ctx.fillStyle = b.color; ctx.fillRect(0,0,canvas.width,canvas.height);
  } else if(b.type==='gradient'){
    const rad = (b.angle||135)*Math.PI/180;
    const x1 = canvas.width/2 - Math.cos(rad)*canvas.width/2;
    const y1 = canvas.height/2 - Math.sin(rad)*canvas.height/2;
    const x2 = canvas.width/2 + Math.cos(rad)*canvas.width/2;
    const y2 = canvas.height/2 + Math.sin(rad)*canvas.height/2;

      }
    } else if(el.shapeType==='arrow'){
      const w=el.w, h=el.h, x=el.x, y=el.y;
      const shaftH = h*0.36, headW = w*0.32;
      ctx.beginPath();
      ctx.moveTo(x, y+h/2-shaftH/2);
      ctx.lineTo(x+w-headW, y+h/2-shaftH/2);
      ctx.lineTo(x+w-headW, y);
      ctx.lineTo(x+w, y+h/2);
      ctx.lineTo(x+w-headW, y+h);
      ctx.lineTo(x+w-headW, y+h/2+shaftH/2);
      ctx.lineTo(x, y+h/2+shaftH/2);
      ctx.closePath();
      ctx.fill();
      if(el.strokeWidth>0){ ctx.strokeStyle=el.stroke; ctx.lineWidth=el.strokeWidth; ctx.stroke(); }
    }
  }
  ctx.restore();

  if(el.id === state.selectedId){ drawSelectionBox(el, cx, cy); }
}
function drawSelectionBox(el, cx, cy){
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate((el.rot||0)*Math.PI/180); ctx.translate(-cx,-cy);
  ctx.strokeStyle = el.locked ? '#6d6489' : '#8b5cf6'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.strokeRect(el.x, el.y, el.w, el.h);
  ctx.setLineDash([]);
  if(!el.locked){
    ctx.fillStyle = '#8b5cf6';
    ctx.fillRect(el.x+el.w-9, el.y+el.h-9, 18, 18); // resize handle
    ctx.beginPath();
    ctx.arc(el.x+el.w/2, el.y-24, 8, 0, Math.PI*2);
    ctx.fill(); // rotate handle
    ctx.beginPath();
    ctx.moveTo(el.x+el.w/2, el.y); ctx.lineTo(el.x+el.w/2, el.y-16);
    ctx.strokeStyle = '#8b5cf6'; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.restore();
}
function drawCurvedText(el){
  const weight = el.bold ? '700' : '400';
  const style = el.italic ? 'italic' : 'normal';
  const font = `${style} ${weight} ${el.fontSize}px '${el.fontFamily}'`;
  const text = (el.text||'').replace(/\n/g,' ').trim();
  if(!text) return;
  ctx.save();
  ctx.font = font;
  const chars = [...text];
  const widths = chars.map(c=> ctx.measureText(c).width + (el.letterSpacing||0));
  const cx = el.x + el.w/2, cy = el.y + el.h/2;
  const radius = Math.max(40, el.curveRadius||220);
  const dir = el.curveDir==='down' ? -1 : 1;
  const angleSteps = widths.map(w=> w/radius);
  const totalAngle = angleSteps.reduce((a,b)=>a+b,0);
  ctx.fillStyle = el.color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if(el.shadowBlur>0){
    ctx.shadowColor = el.shadowColor||'#000000'; ctx.shadowBlur = el.shadowBlur; ctx.shadowOffsetX=3; ctx.shadowOffsetY=3;
  }
  ctx.translate(cx,cy);
  ctx.rotate(-dir*totalAngle/2);
  chars.forEach((c,i)=>{
    ctx.rotate(dir*angleSteps[i]/2);
    ctx.save();
    ctx.translate(0,-dir*radius);
    if(el.strokeWidth>0){ ctx.strokeStyle = el.strokeColor||'#000000'; ctx.lineWidth = el.strokeWidth; ctx.strokeText(c,0,0); }
    ctx.fillText(c,0,0);
    ctx.restore();
    ctx.rotate(dir*angleSteps[i]/2);
  });
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  ctx.restore();
}

let snapGuides = {v:false, h:false};
function draw(){
  drawBackground();
  state.elements.slice().sort((a,b)=>a.z-b.z).forEach(el=>{ if(!el.hidden) drawElement(el); });
  if(state.multiSelectIds && state.multiSelectIds.length){
    ctx.save();
    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
    state.multiSelectIds.forEach(id=>{
      const e = state.elements.find(x=>x.id===id);
      if(e) ctx.strokeRect(e.x-3, e.y-3, e.w+6, e.h+6);
    });
    ctx.setLineDash([]);
    ctx.restore();
  }
  drawEffects();
  if(drag && drag.mode==='move' && (snapGuides.v || snapGuides.h)){
    ctx.save();
    ctx.strokeStyle = '#f0b429'; ctx.lineWidth = 2; ctx.setLineDash([8,6]);
    if(snapGuides.v){ ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke(); }
    if(snapGuides.h){ ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke(); }
    ctx.restore();
  }
}

/* ============================================================
   INTERACTION
   ============================================================ */
let drag = null; // {mode:'move'|'resize'|'rotate', id, startX, startY, orig}

function canvasPoint(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x:(clientX-rect.left)*scaleX, y:(clientY-rect.top)*scaleY };
}

function hitTest(px,py){
  const sorted = state.elements.slice().sort((a,b)=>b.z-a.z);
  for(const el of sorted){
    if(el.hidden) continue;
    const cx = el.x+el.w/2, cy = el.y+el.h/2;
    const rad = -(el.rot||0)*Math.PI/180;
    const dx = px-cx, dy = py-cy;
    const localX = dx*Math.cos(rad) - dy*Math.sin(rad) + cx;
    const localY = dx*Math.sin(rad) + dy*Math.cos(rad) + cy;
    if(localX>=el.x && localX<=el.x+el.w && localY>=el.y && localY<=el.y+el.h){
      return el;
    }
  }
  return null;
}

function handleTest(el, px, py){
  if(!el) return null;
  const cx = el.x+el.w/2, cy = el.y+el.h/2;
  const rad = -(el.rot||0)*Math.PI/180;
  const dx = px-cx, dy = py-cy;
  const localX = dx*Math.cos(rad) - dy*Math.sin(rad) + cx;
  const localY = dx*Math.sin(rad) + dy*Math.cos(rad) + cy;
  if(Math.hypot(localX-(el.x+el.w), localY-(el.y+el.h)) < 16) return 'resize';
  if(Math.hypot(localX-(el.x+el.w/2), localY-(el.y-24)) < 14) return 'rotate';
  return null;
}

canvas.addEventListener('pointerdown', e=>{
  const p = canvasPoint(e);
  const selectedEl = state.elements.find(el=>el.id===state.selectedId);
  const handle = (selectedEl && !selectedEl.locked) ? handleTest(selectedEl, p.x, p.y) : null;
  if(handle){
    drag = { mode:handle, id:selectedEl.id, startX:p.x, startY:p.y, orig:{...selectedEl}, shift:e.shiftKey,
      groupOrig: selectedEl.groupId ? state.elements.filter(x=>x.groupId===selectedEl.groupId).map(x=>({id:x.id, x:x.x, y:x.y})) : null };
    return;
  }
  const hit = hitTest(p.x,p.y);
  if(e.shiftKey && hit){
    // Shift+click: toggle multi-selection for grouping, keep last-clicked as primary for the props panel
    const idx = state.multiSelectIds.indexOf(hit.id);
    if(idx>=0) state.multiSelectIds.splice(idx,1); else state.multiSelectIds.push(hit.id);
    if(state.selectedId!=null && !state.multiSelectIds.includes(state.selectedId)) state.multiSelectIds.push(state.selectedId);
    state.selectedId = hit.id;
    renderProps();
    draw();
    return;
  }
  state.multiSelectIds = [];
  state.selectedId = hit ? hit.id : null;
  renderProps();
  if(hit && !hit.locked){
    drag = { mode:'move', id:hit.id, startX:p.x, startY:p.y, orig:{...hit},
      groupOrig: hit.groupId ? state.elements.filter(x=>x.groupId===hit.groupId).map(x=>({id:x.id, x:x.x, y:x.y})) : null };
  }
  draw();
});
window.addEventListener('pointermove', e=>{
  if(!drag) return;
  const p = canvasPoint(e);
  const el = state.elements.find(x=>x.id===drag.id);
  if(!el) return;
  const dx = p.x-drag.startX, dy = p.y-drag.startY;
  if(drag.mode==='move'){
    el.x = drag.orig.x+dx; el.y = drag.orig.y+dy;
    snapGuides = {v:false, h:false};
    const cxEl = el.x+el.w/2, cyEl = el.y+el.h/2;
    if(Math.abs(cxEl - state.canvasW/2) < 14){ el.x = state.canvasW/2 - el.w/2; snapGuides.v = true; }
    if(Math.abs(cyEl - state.canvasH/2) < 14){ el.y = state.canvasH/2 - el.h/2; snapGuides.h = true; }
    if(state.snapToGrid){
      const g = 20;
      el.x = Math.round(el.x/g)*g;
      el.y = Math.round(el.y/g)*g;
    }
    // move the rest of the group by the same final offset
    if(drag.groupOrig){
      const finalDx = el.x - drag.orig.x, finalDy = el.y - drag.orig.y;
      drag.groupOrig.forEach(g=>{
        if(g.id===el.id) return;
        const other = state.elements.find(x=>x.id===g.id);
        if(other && !other.locked){ other.x = g.x+finalDx; other.y = g.y+finalDy; }
      });
    }
  } else if(drag.mode==='resize'){
    if(e.shiftKey && drag.orig.w>0 && drag.orig.h>0){
      // aspect-ratio-locked resize: follow the larger axis movement
      const ratio = drag.orig.w/drag.orig.h;
      const newW = Math.max(30, drag.orig.w+dx);
      const newH = Math.max(20, drag.orig.h+dy);
      if(Math.abs(dx) > Math.abs(dy)){ el.w = newW; el.h = Math.max(20, newW/ratio); }
      else { el.h = newH; el.w = Math.max(30, newH*ratio); }
    } else {
      el.w = Math.max(30, drag.orig.w+dx); el.h = Math.max(20, drag.orig.h+dy);
    }
  } else if(drag.mode==='rotate'){
    const cx = el.x+el.w/2, cy = el.y+el.h/2;
    const angle = Math.atan2(p.y-cy, p.x-cx)*180/Math.PI + 90;
    el.rot = angle;
  }
  draw();
});
window.addEventListener('pointerup', ()=>{ if(drag){ drag=null; snapGuides={v:false,h:false}; draw(); pushHistory(); } });

canvas.addEventListener('dblclick', e=>{
  const p = canvasPoint(e);
  const hit = hitTest(p.x,p.y);
  if(hit && hit.type==='text') openTextEditor(hit);
});

function openTextEditor(el){
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width/canvas.width;
  const editor = document.getElementById('textEditor');
  editor.hidden = false;
  editor.style.left = (rect.left+el.x*scale)+'px';
  editor.style.top = (rect.top+el.y*scale)+'px';
  editor.style.width = (el.w*scale)+'px';
  editor.style.height = (el.h*scale)+'px';
  editor.style.fontSize = (el.fontSize*scale)+'px';
  editor.style.fontFamily = el.fontFamily;
  editor.style.textAlign = el.align;
  editor.value = el.text;
  editor.focus();
  editor.select();
  function commit(){
    el.text = editor.value;
    editor.hidden = true;
    editor.removeEventListener('blur', commit);
    draw();
    pushHistory();
  }
  editor.addEventListener('blur', commit, {once:true});
}

}

    id: nextId++, type:'image', x:state.canvasW/2-150, y:state.canvasH/2-150, w:w||300, h:h||300,
    rot:0, z:state.elements.length, src, img:null, opacity:1
  };
  loadElementImage(el);
  state.elements.push(el);
  state.selectedId = el.id;
  draw(); renderProps(); pushHistory();
}
function addShapeElement(shapeType){
  const el = {
    id: nextId++, type:'shape', shapeType, rot:0, z:state.elements.length,
    fill:'#8b5cf6', stroke:'#ffffff', strokeWidth:0, radius:20, opacity:1,
    x: state.canvasW/2-150, y: state.canvasH/2-100, w:300, h:200
  };
  if(shapeType==='line'){ el.w=320; el.h=6; el.y=state.canvasH/2-3; el.fill='#ffffff'; }
  if(shapeType==='ellipse'){ el.w=260; el.h=260; el.x=state.canvasW/2-130; el.y=state.canvasH/2-130; }
  if(shapeType==='triangle'){ el.w=260; el.h=240; el.x=state.canvasW/2-130; el.y=state.canvasH/2-120; }
  if(shapeType==='star'){ el.w=240; el.h=240; el.x=state.canvasW/2-120; el.y=state.canvasH/2-120; }
  if(shapeType==='heart'){ el.w=240; el.h=220; el.x=state.canvasW/2-120; el.y=state.canvasH/2-110; }
  if(shapeType==='arrow'){ el.w=320; el.h=100; el.x=state.canvasW/2-160; el.y=state.canvasH/2-50; }
  if(shapeType==='hexagon'){ el.w=260; el.h=240; el.x=state.canvasW/2-130; el.y=state.canvasH/2-120; }
  if(shapeType==='bubble'){ el.w=320; el.h=220; el.x=state.canvasW/2-160; el.y=state.canvasH/2-110; }
  state.elements.push(el);
  state.selectedId = el.id;
  draw(); renderProps(); pushHistory();
}
function addEmojiSticker(emoji){
  const el = {
    id: nextId++, type:'text', x:state.canvasW/2-110, y:state.canvasH/2-110, w:220, h:220, rot:0, z:state.elements.length,
    text: emoji, fontFamily:'Cairo', fontSize:140, color:'#ffffff',
    align:'center', bold:false, italic:false, opacity:1, lineHeightMult:1
  };
  state.elements.push(el);
  state.selectedId = el.id;
  draw(); renderProps(); pushHistory();
}
function duplicateSelected(){
  const el = state.elements.find(e=>e.id===state.selectedId);
  if(!el) return;
  const copy = {...el, id:nextId++, x:el.x+24, y:el.y+24, z:state.elements.length};
  state.elements.push(copy);
  state.selectedId = copy.id;
  draw(); renderProps(); pushHistory();
}
function groupSelected(){
  const ids = new Set(state.multiSelectIds);
  if(state.selectedId!=null) ids.add(state.selectedId);
  if(ids.size < 2) return;
  const gid = 'g'+(nextId++);
  state.elements.forEach(e=>{ if(ids.has(e.id)) e.groupId = gid; });
  state.multiSelectIds = [];
  draw(); renderProps(); pushHistory();
}
function ungroupSelected(){
  const el = state.elements.find(e=>e.id===state.selectedId);
  if(!el || !el.groupId) return;
  const gid = el.groupId;
  state.elements.forEach(e=>{ if(e.groupId===gid) delete e.groupId; });
  draw(); renderProps(); pushHistory();
}
function deleteSelected(){
  state.elements = state.elements.filter(e=>e.id!==state.selectedId);
  state.selectedId = null;
  draw(); renderProps(); pushHistory();
}
function reorderSelected(dir){
  const el = state.elements.find(e=>e.id===state.selectedId);
  if(!el) return;
  el.z += dir*1.5;
  draw(); pushHistory();
}

        <h3>⚡ إزالة الخلفية باللون (سريعة، بدون AI)</h3>

        <canvas id="p_colorPickCanvas" width="220" height="140" style="width:100%;height:110px;border-radius:8px;border:1px solid var(--border);cursor:crosshair;display:block;margin-bottom:10px;"></canvas>
        <div class="prop-row"><label>اللون المحدد</label><input type="color" id="p_bgColorPick" value="${el.lastPickedBgColor||'#ffffff'}"></div>
        <div class="prop-row"><label>الحساسية <span id="p_bgToleranceVal">${el.bgTolerance||40}</span></label><input type="range" id="p_bgTolerance" min="1" max="150" value="${el.bgTolerance||40}"></div>
        <div class="prop-row"><label>نعومة الحواف <span id="p_bgFeatherVal">${el.bgFeather??20}</span></label><input type="range" id="p_bgFeather" min="0" max="60" value="${el.bgFeather??20}"></div>
        <button class="danger-btn" id="p_removeBgColor" style="border-color:var(--amber);color:var(--amber);">⚡ إزالة الخلفية بهذا اللون</button>
      </div>
      <div class="prop-group">
        <h3>إزالة الخلفية بالذكاء الاصطناعي</h3>
        <button class="danger-btn" id="p_removeBg" style="border-color:var(--teal);color:var(--teal);">✂ إزالة خلفية الصورة (AI)</button>
        ${el.bgRemoved ? `<div style="font-size:11px;color:var(--muted2);margin-top:6px;">تمت إزالة الخلفية بالفعل. <span id="p_undoRemoveBg" style="color:var(--teal);cursor:pointer;text-decoration:underline;">استرجاع الصورة الأصلية</span></div>` : ''}
      </div>
      <div class="prop-group">
        <h3>فلاتر جاهزة</h3>
        <div class="style-preset-grid" id="imgFilterPresetGrid"></div>
      </div>
      <div class="prop-group">
        <h3>🎨 تراكب لون ثنائي (Duotone)</h3>
        <div class="style-btns" style="margin-bottom:8px;">
          <button id="p_duotoneToggle" class="${el.duotone?'active':''}">${el.duotone?'✓ الدمج اللوني مفعّل':'تفعيل التراكب اللوني'}</button>
        </div>
        <div class="drawer-hint" style="margin:0 0 8px;">يحوّل الصورة لدرجتين لونيتين بس (ظل + إضاءة) — اختر من الجاهز أو حدد ألوانك.</div>
        <div class="style-preset-grid" id="duotonePresetGrid" style="margin-bottom:10px;"></div>
        <div class="prop-row"><label>لون الظل (الغامق)</label><input type="color" id="p_duotoneShadow" value="${el.duotoneShadow||'#1a1a2e'}"></div>
        <div class="prop-row"><label>لون الإضاءة (الفاتح)</label><input type="color" id="p_duotoneHighlight" value="${el.duotoneHighlight||'#f0b429'}"></div>
        <div class="prop-row"><label>قوة التأثير</label><input type="range" id="p_duotoneIntensity" min="0" max="100" value="${el.duotoneIntensity??100}"></div>
      </div>
      <div class="prop-group">
        <h3>فلاتر الصورة</h3>
        <div class="prop-row"><label>سطوع</label><input type="range" id="p_brightness" min="0" max="200" value="${el.brightness??100}"></div>
        <div class="prop-row"><label>تباين</label><input type="range" id="p_contrast" min="0" max="200" value="${el.contrast??100}"></div>
        <div class="prop-row"><label>تشبع</label><input type="range" id="p_saturate" min="0" max="200" value="${el.saturate??100}"></div>
        <div class="prop-row"><label>تدرج رمادي</label><input type="range" id="p_grayscale" min="0" max="100" value="${el.grayscale??0}"></div>
        <div class="prop-row"><label>ضبابية</label><input type="range" id="p_blur" min="0" max="20" value="${el.blur??0}"></div>
      </div>
      <div class="prop-group">
        <h3>تحويل الصورة</h3>
        <div class="style-btns">
          <button id="p_flipH" class="${el.flipH?'active':''}">⇋ قلب أفقي</button>
          <button id="p_flipV" class="${el.flipV?'active':''}">⇅ قلب رأسي</button>
        </div>
        <div class="prop-row" style="margin-top:8px;"><label>استدارة الحواف</label><input type="range" id="p_imgRadius" min="0" max="200" value="${el.imgRadius||0}" ${el.imgCircle?'disabled':''}></div>
        <div class="prop-row"><label>قصّ دائري</label><input type="checkbox" id="p_imgCircle" ${el.imgCircle?'checked':''} style="flex:0;width:18px;height:18px;"></div>
      </div>`;
  }
  html += `
    <div class="prop-group">
      <div class="prop-row"><label>الشفافية</label><input type="range" id="p_opacity" min="0" max="1" step="0.05" value="${el.opacity==null?1:el.opacity}"></div>
      <div class="prop-row"><label>الدوران</label><input type="range" id="p_rot" min="-180" max="180" value="${el.rot||0}"></div>
      <div class="drawer-hint" style="margin:2px 0 0;">💡 اضغط مع الاستمرار على Shift أثناء سحب مقبض التحجيم (الزاوية) للحفاظ على نسبة الأبعاد.</div>
    </div>
    <div class="prop-group">
      <h3>🌗 دمج مع العناصر تحته (Blend)</h3>
      <div class="prop-row"><label>وضع الدمج</label>
        <select id="p_blendMode">${BLEND_MODES.map(b=>`<option value="${b.value}" ${(el.blendMode||'source-over')===b.value?'selected':''}>${b.label}</option>`).join('')}</select>
      </div>
      <div class="drawer-hint" style="margin:6px 0 0;">جرّب "شفاف مضيء" لتأثير توهج، أو "تغميق/ظل" لتأثير مظلم فوق العناصر تحته — تمامًا زي أدوات الدمج في بيكس آرت. اجمعها مع الشفافية للتحكم في القوة.</div>
    </div>
    <div class="prop-group">
      <div class="align-btns">
        <button id="p_centerH">↔ توسيط أفقي</button>
        <button id="p_centerV">↕ توسيط رأسي</button>
      </div>
      <div class="align-edge-grid">
        <button id="p_alignLeft">⇤ لليسار</button>
        <button id="p_alignRight">⇥ لليمين</button>
        <button id="p_alignTop">⤒ لأعلى</button>
        <button id="p_alignBottom">⤓ لأسفل</button>
        <button id="p_dup2">⧉ نسخ</button>
        <button id="p_dup4">⧉ ×4</button>
      </div>
    </div>
    <div class="prop-group">
      <div class="lock-hide-row">
        <button id="p_lock" class="${el.locked?'active':''}">${el.locked?'🔒 مقفول':'🔓 قفل'}</button>
        <button id="p_hide">${el.hidden?'🙈 مخفي':'👁 إخفاء'}</button>
      </div>
      <div class="layer-btns">
        <button id="p_front">⬆ للأمام</button>
        <button id="p_back">⬇ للخلف</button>
      </div>
      <button class="danger-btn" id="p_delete">🗑 حذف العنصر</button>
    </div>
    <div class="prop-group"><h3>الطبقات</h3><ul class="layers-list" id="layersList"></ul></div>
  `;
  content.innerHTML = html;

  const q = id=>document.getElementById(id);
  if(q('p_group')) q('p_group').onclick = groupSelected;
  if(q('p_ungroup')) q('p_ungroup').onclick = ungroupSelected;
  if(el.type==='text'){
    q('p_font').onchange = e=>{ el.fontFamily=e.target.value; draw(); pushHistory(); };
    q('p_size').oninput = e=>{ el.fontSize=+e.target.value; draw(); };
    q('p_size').onchange = ()=>pushHistory();
    q('p_color').oninput = e=>{ el.color=e.target.value; draw(); };
    q('p_color').onchange = ()=>pushHistory();
    content.querySelectorAll('[data-align]').forEach(btn=>{
      btn.onclick = ()=>{ el.align=btn.dataset.align; draw(); renderProps(); pushHistory(); };
    });
    q('p_bold').onclick = ()=>{ el.bold=!el.bold; draw(); renderProps(); pushHistory(); };
    q('p_italic').onclick = ()=>{ el.italic=!el.italic; draw(); renderProps(); pushHistory(); };
    q('p_letterSpacing').oninput = e=>{ el.letterSpacing=+e.target.value; draw(); };
    q('p_letterSpacing').onchange = ()=>pushHistory();
    q('p_lineHeight').oninput = e=>{ el.lineHeightMult=+e.target.value; draw(); };
    q('p_lineHeight').onchange = ()=>pushHistory();
    q('p_strokeColor').oninput = e=>{ el.strokeColor=e.target.value; draw(); };
    q('p_strokeColor').onchange = ()=>pushHistory();
    q('p_strokeWidth').oninput = e=>{ el.strokeWidth=+e.target.value; draw(); };
    q('p_strokeWidth').onchange = ()=>pushHistory();
    q('p_shadowColor').oninput = e=>{ el.shadowColor=e.target.value; draw(); };
    q('p_shadowColor').onchange = ()=>pushHistory();
    q('p_shadowBlur').oninput = e=>{ el.shadowBlur=+e.target.value; draw(); };
    q('p_shadowBlur').onchange = ()=>pushHistory();
    q('p_bgColor').oninput = e=>{ el.bgColor=e.target.value; draw(); };
    q('p_bgColor').onchange = ()=>pushHistory();
    q('p_bgOpacity').oninput = e=>{ el.bgOpacity=+e.target.value; draw(); };
    q('p_bgOpacity').onchange = ()=>pushHistory();
    q('p_bgPadding').oninput = e=>{ el.bgPadding=+e.target.value; draw(); };
    q('p_bgPadding').onchange = ()=>pushHistory();
    q('p_bgRadius').oninput = e=>{ el.bgRadius=+e.target.value; draw(); };
    q('p_bgRadius').onchange = ()=>pushHistory();
    q('p_removeDiacritics').onclick = ()=>{
      el.text = (el.text||'').replace(/[\u064B-\u0652\u0670\u06D6-\u06ED]/g,'');
      draw(); renderProps(); pushHistory();
    };
    q('p_curveToggle').onclick = ()=>{ el.curved = !el.curved; draw(); renderProps(); pushHistory(); };
    q('p_curveUp').onclick = ()=>{ el.curveDir='up'; draw(); renderProps(); pushHistory(); };
    q('p_curveDown').onclick = ()=>{ el.curveDir='down'; draw(); renderProps(); pushHistory(); };
    q('p_curveRadius').oninput = e=>{ el.curveRadius=+e.target.value; draw(); };
    q('p_curveRadius').onchange = ()=>pushHistory();
  }
  if(el.type==='shape'){
    q('p_fillSolid').onclick = ()=>{ el.fillType='solid'; draw(); renderProps(); pushHistory(); };
    q('p_fillGradient').onclick = ()=>{ el.fillType='gradient'; if(!el.fillFrom) el.fillFrom=el.fill; draw(); renderProps(); pushHistory(); };
    if(el.fillType==='gradient'){
      q('p_fillFrom').oninput = e=>{ el.fillFrom=e.target.value; draw(); };
      q('p_fillFrom').onchange = ()=>pushHistory();
      q('p_fillTo').oninput = e=>{ el.fillTo=e.target.value; draw(); };
      q('p_fillTo').onchange = ()=>pushHistory();
      q('p_fillAngle').oninput = e=>{ el.fillAngle=+e.target.value; draw(); };
      q('p_fillAngle').onchange = ()=>pushHistory();
    } else {
      q('p_fill').oninput = e=>{ el.fill=e.target.value; draw(); };
      q('p_fill').onchange = ()=>pushHistory();
    }
    if(el.shapeType!=='line'){
      q('p_stroke').oninput = e=>{ el.stroke=e.target.value; draw(); };
      q('p_stroke').onchange = ()=>pushHistory();
      q('p_strokeWidth').oninput = e=>{ el.strokeWidth=+e.target.value; draw(); };
      q('p_strokeWidth').onchange = ()=>pushHistory();
    }
    if(el.shapeType==='rect'){
      q('p_radius').oninput = e=>{ el.radius=+e.target.value; draw(); };
      q('p_radius').onchange = ()=>pushHistory();
    }
  }
  if(el.type==='image'){
    const fpg = q('imgFilterPresetGrid');
    IMAGE_FILTER_PRESETS.forEach(fp=>{
      const div = document.createElement('div');
      div.className = 'style-preset';
      div.textContent = fp.name;
      div.style.fontSize = '12.5px';
      div.onclick = ()=>{
        Object.assign(el, {brightness:fp.brightness, contrast:fp.contrast, saturate:fp.saturate, grayscale:fp.grayscale, blur:fp.blur});
        draw(); renderProps(); pushHistory();
      };
      fpg.appendChild(div);
    });
    ['brightness','contrast','saturate','grayscale','blur'].forEach(prop=>{
      const input = q('p_'+prop);
      input.oninput = e=>{ el[prop]=+e.target.value; draw(); };
      input.onchange = ()=>pushHistory();
    });
    q('p_duotoneToggle').onclick = ()=>{ el.duotone = !el.duotone; draw(); renderProps(); pushHistory(); };
    const dpg = q('duotonePresetGrid');
    DUOTONE_PRESETS.forEach(dp=>{
      const div = document.createElement('div');
      div.className = 'style-preset';
      div.style.fontSize = '11.5px';
      div.style.background = `linear-gradient(135deg,${dp.shadow},${dp.highlight})`;
      div.style.color = '#fff';
      div.style.textShadow = '0 1px 3px rgba(0,0,0,.6)';
      div.textContent = dp.name;
      div.onclick = ()=>{
        el.duotone = true; el.duotoneShadow = dp.shadow; el.duotoneHighlight = dp.highlight;
        draw(); renderProps(); pushHistory();
      };
      dpg.appendChild(div);
    });
    q('p_duotoneShadow').oninput = e=>{ el.duotoneShadow=e.target.value; el.duotone=true; draw(); };
    q('p_duotoneShadow').onchange = ()=>{ renderProps(); pushHistory(); };
    q('p_duotoneHighlight').oninput = e=>{ el.duotoneHighlight=e.target.value; el.duotone=true; draw(); };
    q('p_duotoneHighlight').onchange = ()=>{ renderProps(); pushHistory(); };
    q('p_duotoneIntensity').oninput = e=>{ el.duotoneIntensity=+e.target.value; draw(); };
    q('p_duotoneIntensity').onchange = ()=>pushHistory();
    q('p_removeBg').onclick = ()=> removeImageBackground(el);
    if(q('p_undoRemoveBg')) q('p_undoRemoveBg').onclick = ()=>{
      if(el.srcBeforeBgRemoval){ el.src = el.srcBeforeBgRemoval; el.srcBeforeBgRemoval = null; el.bgRemoved = false; el.img = null; loadElementImage(el); draw(); renderProps(); pushHistory(); }
    };
    drawColorPickPreview(el);
    const pickCanvas = q('p_colorPickCanvas');
    if(pickCanvas){
      pickCanvas.onclick = e=>{
        const rect = pickCanvas.getBoundingClientRect();
        const clickX = Math.round((e.clientX-rect.left) * (pickCanvas.width/rect.width));
        const clickY = Math.round((e.clientY-rect.top) * (pickCanvas.height/rect.height));
        const cx = Math.max(0, Math.min(pickCanvas.width-1, clickX));
        const cy = Math.max(0, Math.min(pickCanvas.height-1, clickY));
        try{
          const px = pickCanvas.getContext('2d').getImageData(cx, cy, 1, 1).data;
          const hex = '#' + [px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
          q('p_bgColorPick').value = hex;
        }catch(err){}
      };
    }
    q('p_bgTolerance').oninput = e=>{ q('p_bgToleranceVal').textContent = e.target.value; };
    q('p_bgFeather').oninput = e=>{ q('p_bgFeatherVal').textContent = e.target.value; };
    q('p_removeBgColor').onclick = ()=>{
      applyColorBgRemoval(el, q('p_bgColorPick').value, +q('p_bgTolerance').value, +q('p_bgFeather').value);
    };
    q('p_flipH').onclick = ()=>{ el.flipH=!el.flipH; draw(); renderProps(); pushHistory(); };
    q('p_flipV').onclick = ()=>{ el.flipV=!el.flipV; draw(); renderProps(); pushHistory(); };
    q('p_imgRadius').oninput = e=>{ el.imgRadius=+e.target.value; draw(); };
    q('p_imgRadius').onchange = ()=>pushHistory();
    q('p_imgCircle').onchange = e=>{ el.imgCircle=e.target.checked; draw(); renderProps(); pushHistory(); };
  }
  q('p_opacity').oninput = e=>{ el.opacity=+e.target.value; draw(); };
  q('p_opacity').onchange = ()=>pushHistory();
  q('p_rot').oninput = e=>{ el.rot=+e.target.value; draw(); };
  q('p_rot').onchange = ()=>pushHistory();
  q('p_blendMode').onchange = e=>{ el.blendMode=e.target.value; draw(); pushHistory(); };
  q('p_centerH').onclick = ()=>{ el.x = state.canvasW/2 - el.w/2; draw(); pushHistory(); };
  q('p_centerV').onclick = ()=>{ el.y = state.canvasH/2 - el.h/2; draw(); pushHistory(); };
  q('p_alignLeft').onclick = ()=>{ el.x = 0; draw(); pushHistory(); };
  q('p_alignRight').onclick = ()=>{ el.x = state.canvasW - el.w; draw(); pushHistory(); };
  q('p_alignTop').onclick = ()=>{ el.y = 0; draw(); pushHistory(); };
  q('p_alignBottom').onclick = ()=>{ el.y = state.canvasH - el.h; draw(); pushHistory(); };
  q('p_dup2').onclick = duplicateSelected;
  q('p_dup4').onclick = ()=>{ for(let i=0;i<4;i++) duplicateSelected(); };
  q('p_lock').onclick = ()=>{ el.locked=!el.locked; draw(); renderProps(); pushHistory(); };
  q('p_hide').onclick = ()=>{ el.hidden=!el.hidden; draw(); renderProps(); pushHistory(); };
  q('p_front').onclick = ()=>reorderSelected(1);
  q('p_back').onclick = ()=>reorderSelected(-1);
  q('p_delete').onclick = deleteSelected;

  renderLayersList();
}
function renderLayersList(){
  const list = document.getElementById('layersList');
  if(!list) return;
  const sorted = state.elements.slice().sort((a,b)=>b.z-a.z);
  list.innerHTML = sorted.map(el=>{
    const icon = el.type==='text' ? '🔤' : (el.type==='shape' ? '◆' : '🖼');
    const defaultLabel = el.type==='shape' ? ('شكل: '+(el.shapeType==='rect'?'مربع':el.shapeType==='ellipse'?'دائرة':el.shapeType==='line'?'خط':el.shapeType==='triangle'?'مثلث':el.shapeType==='star'?'نجمة':el.shapeType==='heart'?'قلب':el.shapeType==='arrow'?'سهم':el.shapeType==='hexagon'?'سداسي':el.shapeType==='bubble'?'فقاعة كلام':el.shapeType)) : (el.text||el.src||'عنصر');
    const label = el.name || defaultLabel;
    return `<li data-id="${el.id}" class="${el.id===state.selectedId?'selected':''} ${el.locked?'locked-el':''}">
      <span class="layer-label" data-rename="${el.id}" title="دبل كليك لإعادة التسمية">${icon} ${label.toString().slice(0,14)}</span>
      <span class="layer-icons">
        <span data-act="lock" data-id="${el.id}" title="قفل/فتح">${el.locked?'🔒':'🔓'}</span>
        <span data-act="hide" data-id="${el.id}" title="إخفاء/إظهار">${el.hidden?'🙈':'👁'}</span>
      </span>
    </li>`;
  }).join('') || '<li style="color:var(--muted2)">لا توجد عناصر</li>';
  list.querySelectorAll('li[data-id]').forEach(li=>{
    li.onclick = ()=>{ state.selectedId = +li.dataset.id; draw(); renderProps(); };
  });
  list.querySelectorAll('[data-rename]').forEach(span=>{
    span.ondblclick = ev=>{
      ev.stopPropagation();
      const el = state.elements.find(e=>e.id===+span.dataset.rename);
      if(!el) return;
      const name = prompt('اسم الطبقة:', el.name || '');
      if(name===null) return;
      el.name = name.trim();
      renderLayersList(); pushHistory();
    };
  });
  list.querySelectorAll('[data-act]').forEach(icon=>{
    icon.onclick = ev=>{
      ev.stopPropagation();
      const el = state.elements.find(e=>e.id===+icon.dataset.id);
      if(!el) return;
      if(icon.dataset.act==='lock') el.locked = !el.locked;
      if(icon.dataset.act==='hide') el.hidden = !el.hidden;
      draw(); renderProps(); pushHistory();
    };
  });
}

/* ============================================================
   ASSET DRAWER (right panel)
   ============================================================ */
let activeTab = 'fonts';
let bgSubType = null; // overrides state.background.type for the panel view (e.g. choosing 'gradient' while type still color)
function renderDrawer(){
  const body = document.getElementById('drawerBody');
  if(activeTab==='fonts'){
    body.innerHTML = `
      <button class="upload-btn" id="fontUploadBtn">📤 إضافة خط من جهازك (يُحفظ تلقائيًا)</button>
      <div class="drawer-hint">دوس على أي خط لإضافة نص جديد بيه، أو لتغيير خط العنصر المحدد.</div>
      <div class="asset-grid" id="fontGrid"></div>`;
    document.getElementById('fontUploadBtn').onclick = ()=>openUploader('font');
    const grid = document.getElementById('fontGrid');
    assetLibrary.fonts.forEach(f=>{
      const div = document.createElement('div');
      div.className = 'asset-item font-item';
      div.style.fontFamily = f.family;
      div.innerHTML = `أبجد<div class="lbl">${f.label}</div>${f.source==='uploaded'?'<div class="asset-del" title="حذف">×</div>':''}`;
      div.onclick = ()=>{
        const sel = state.elements.find(e=>e.id===state.selectedId);
        if(sel && sel.type==='text'){ sel.fontFamily=f.family; draw(); renderProps(); pushHistory(); }
        else { addTextElement(); const el = state.elements[state.elements.length-1]; el.fontFamily=f.family; draw(); }
      };
      if(f.source==='uploaded'){
        div.querySelector('.asset-del').onclick = ev=>{ ev.stopPropagation(); if(confirm('حذف هذا الخط؟')) deleteUploadedAsset('font', f.id); };
      }
      grid.appendChild(div);
    });
  }
  else if(activeTab==='backgrounds'){
    const curType = bgSubType || state.background.type;
    body.innerHTML = `
      <div class="drawer-hint">اختر نوع الخلفية:</div>
      <div class="style-btns" style="margin-bottom:12px;">
        <button data-bgtype="gradient" class="${curType==='gradient'?'active':''}">تدرج</button>
        <button data-bgtype="color" class="${curType==='color'?'active':''}">لون</button>
        <button data-bgtype="image" class="${curType==='image'?'active':''}">صورة</button>
        <button data-bgtype="pattern" class="${curType==='pattern'?'active':''}">نقشة</button>
      </div>
      <div id="bgTypeBody"></div>`;
    body.querySelectorAll('[data-bgtype]').forEach(btn=>{
      btn.onclick = ()=>{ bgSubType = btn.dataset.bgtype; renderDrawer(); };
    });
    const tbody = document.getElementById('bgTypeBody');
    if(curType==='gradient'){
      const bg = state.background.type==='gradient' ? state.background : {from:'#8b5cf6', to:'#ec4899', angle:135};
      tbody.innerHTML = `

function renderPaletteGrid(){
  const grid = document.getElementById('paletteGrid');
  if(!grid) return;
  const palette = loadPalette();
  if(!palette.length){
    grid.innerHTML = '<div class="empty-note">لسه مفيش ألوان محفوظة.<br>ضيف لون من فوق.</div>';
    return;
  }
  grid.innerHTML = '';
  palette.forEach((c,i)=>{
    const sw = document.createElement('div');
    sw.className = 'palette-swatch';
    sw.style.background = c;
    sw.title = c;
    sw.innerHTML = '<span class="pal-del" title="حذف">×</span>';
    sw.onclick = (ev)=>{
      if(ev.target.classList.contains('pal-del')) return;
      applyPaletteColor(c);
    };
    sw.querySelector('.pal-del').onclick = ev=>{ ev.stopPropagation(); removePaletteColor(i); };
    grid.appendChild(sw);
  });
}
function loadPalette(){
  try{ return JSON.parse(localStorage.getItem('qs_palette')||'[]'); }catch(e){ return []; }
}
function savePalette(p){ try{ localStorage.setItem('qs_palette', JSON.stringify(p)); }catch(e){} }
function addPaletteColor(c){
  const palette = loadPalette();
  if(!palette.includes(c)) palette.push(c);
  savePalette(palette);
  renderPaletteGrid();
}
function removePaletteColor(i){
  const palette = loadPalette();
  palette.splice(i,1);
  savePalette(palette);
  renderPaletteGrid();
}
function applyPaletteColor(c){
  const el = state.elements.find(e=>e.id===state.selectedId);
  if(el && el.type==='text'){ el.color=c; draw(); renderProps(); pushHistory(); }
  else if(el && el.type==='shape'){ el.fill=c; draw(); renderProps(); pushHistory(); }
  else { state.background = {...state.background, type:'color', color:c}; draw(); pushHistory(); }
}
function loadFavQuotes(){
  try{ return JSON.parse(localStorage.getItem('qs_fav_quotes')||'[]'); }catch(e){ return []; }
}
function saveFavQuotes(list){ try{ localStorage.setItem('qs_fav_quotes', JSON.stringify(list)); }catch(e){} }
function toggleFavQuote(t,a){
  let favs = loadFavQuotes();
  const idx = favs.findIndex(f=>f.t===t);
  if(idx>-1) favs.splice(idx,1); else favs.push({t,a});
  saveFavQuotes(favs);
}
function addQuoteText(text, author){
  const box = { x: state.canvasW*0.1, y: state.canvasH*0.32, w: state.canvasW*0.8 };
  const quoteEl = {
    id: nextId++, type:'text', x:box.x, y:box.y, w:box.w, h:state.canvasH*0.32, rot:0, z:state.elements.length,
    text, fontFamily:'Aref Ruqaa', fontSize:52, color:'#ffffff', align:'center', bold:true, italic:false,
    opacity:1, lineHeightMult:1.5
  };
  const authorEl = {
    id: nextId++, type:'text', x:box.x, y:box.y+state.canvasH*0.34, w:box.w, h:60, rot:0, z:state.elements.length+1,
    text:'— '+author, fontFamily:'Cairo', fontSize:24, color:'#e9d8ff', align:'center', bold:false, italic:false, opacity:.85
  };
  state.elements.push(quoteEl, authorEl);
  state.selectedId = quoteEl.id;
  draw(); renderProps(); pushHistory();
}
function applyTextStylePreset(p){
  let el = state.elements.find(e=>e.id===state.selectedId);
  if(!el || el.type!=='text'){
    addTextElement('اكتب نصك هنا');
    el = state.elements[state.elements.length-1];
  }
  Object.assign(el, {
    fontFamily:p.fontFamily, fontSize:p.fontSize, color:p.color, bold:!!p.bold,
    strokeWidth:p.strokeWidth||0, strokeColor:p.strokeColor||'#000000',
    shadowBlur:p.shadowBlur||0, shadowColor:p.shadowColor||'#000000',
    letterSpacing:p.letterSpacing||0, lineHeightMult:p.lineHeightMult||1.3
  });
  draw(); renderProps(); pushHistory();
}
function loadTemplate(data){
  state.background = {...data.background};
  loadBackgroundImage();
  state.elements = data.elements.map(e=>({...e, id:nextId++, z:state.elements.length}));
  state.elements.forEach(loadElementImage);
  state.selectedId = null;
  draw(); renderProps(); pushHistory();
}

document.getElementById('exportVideoBtn').onclick = ()=>{
  if(!canvas.captureStream || typeof MediaRecorder==='undefined'){
    alert('متصفحك لا يدعم تصدير الفيديو. جرب فتح الاستوديو من متصفح Chrome على الكمبيوتر.');
    return;
  }
  state.selectedId = null; renderProps();
  const mimeCandidates = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const mimeType = mimeCandidates.find(m=> MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) || 'video/webm';
  const stream = canvas.captureStream(30);
  const chunks = [];
  let recorder;
  try{ recorder = new MediaRecorder(stream, {mimeType}); }
  catch(e){ alert('تعذر بدء تسجيل الفيديو في هذا المتصفح.'); return; }
  recorder.ondataavailable = e=>{ if(e.data && e.data.size) chunks.push(e.data); };
  recorder.onstop = ()=>{
    const blob = new Blob(chunks, {type:'video/webm'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'quote-design.webm'; a.click();
  };
  recorder.start();
  const duration = 1600, hold = 500;
  const start = performance.now();
  function frame(now){
    const t = Math.min(1, (now-start)/duration);
    draw();
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.restore();
    if(t<1){ requestAnimationFrame(frame); }
    else{
      draw();
      setTimeout(()=>{ recorder.stop(); }, hold);
    }
  }
  requestAnimationFrame(frame);
  closeSidebar();
};

window.addEventListener('keydown', e=>{
  if(e.target.tagName==='TEXTAREA' || e.target.tagName==='INPUT') return;
  if((e.key==='Delete'||e.key==='Backspace') && state.selectedId){ deleteSelected(); }
  if(e.ctrlKey && e.key==='z'){ undo(); }
  if(e.ctrlKey && e.key==='y'){ redo(); }
  if(e.ctrlKey && e.key==='d' && state.selectedId){ e.preventDefault(); duplicateSelected(); }
  if(e.key==='Escape'){ state.selectedId=null; draw(); renderProps(); }
  if(state.selectedId && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)){
    e.preventDefault();
    const el = state.elements.find(x=>x.id===state.selectedId);
    if(el && !el.locked){
      const step = e.shiftKey ? 10 : 1;
      if(e.key==='ArrowLeft') el.x -= step;
      if(e.key==='ArrowRight') el.x += step;
      if(e.key==='ArrowUp') el.y -= step;
      if(e.key==='ArrowDown') el.y += step;
      draw();
    }
  }
});
window.addEventListener('keyup', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key) && state.selectedId){ pushHistory(); }
});
window.addEventListener('resize', syncCanvasSize);

}
init();
